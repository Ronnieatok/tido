{{define "newsletter-form"}}
<form class="newsletter-form"
      hx-post="/api/newsletter"
      hx-target="#newsletterWrap"
      hx-swap="innerHTML"
      hx-indicator="#nlSpinner">
  <label for="nl-email" class="sr-only">Email address</label>
  <input type="email" id="nl-email" name="email" placeholder="Your email address" required>
  <button type="submit" aria-label="Subscribe to newsletter">
    <span class="btn-label"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i></span>
    <span class="spinner dark htmx-indicator" id="nlSpinner" aria-hidden="true"></span>
  </button>
</form>
{{end}}

{{define "newsletter-success"}}
<p style="font-size:.92rem; color:#fff; display:flex; align-items:center; gap:.5rem;">
  <i class="fa-solid fa-circle-check" aria-hidden="true" style="color:var(--color-ochre-light);"></i>
  Subscribed! Thank you for staying connected with TIDO.
</p>
{{end}}

{{define "newsletter-error"}}
<form class="newsletter-form"
      hx-post="/api/newsletter"
      hx-target="#newsletterWrap"
      hx-swap="innerHTML"
      hx-indicator="#nlSpinner">
  <label for="nl-email" class="sr-only">Email address</label>
  <input type="email" id="nl-email" name="email" placeholder="Your email address" value="{{.}}" required style="border-color:#e07856;">
  <button type="submit" aria-label="Subscribe to newsletter">
    <span class="btn-label"><i class="fa-solid fa-paper-plane" aria-hidden="true"></i></span>
    <span class="spinner dark htmx-indicator" id="nlSpinner" aria-hidden="true"></span>
  </button>
</form>
<span style="font-size:.78rem; color:#f1a98c; margin-top:.4rem; display:inline-block;">Please enter a valid email address.</span>
{{end}}
